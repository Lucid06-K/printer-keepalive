name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check (bash -n)
        run: |
          for f in src/printer-keepalive.sh src/pkeep install.sh uninstall.sh release.sh; do
            bash -n "$f"
          done
      - name: ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -S warning src/printer-keepalive.sh src/pkeep install.sh uninstall.sh release.sh
